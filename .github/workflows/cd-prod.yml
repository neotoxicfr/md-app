name: CD Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/dependabot.yml"
      - ".editorconfig"
      - ".markdownlint.json"
      - ".markdownlintignore"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: go.sum

      - name: Go test
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Frontend build
        working-directory: web
        run: |
          npm ci
          npx svelte-check --tsconfig ./tsconfig.json
          npm run build

      - name: Docker build
        run: docker build -f Dockerfile.app -t md-app:ci .

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check SSH secrets
        id: check_secrets
        env:
          HAS_HOST: ${{ secrets.MD_PROD_SSH_HOST != '' }}
          HAS_USER: ${{ secrets.MD_PROD_SSH_USER != '' }}
          HAS_KEY: ${{ secrets.MD_PROD_SSH_KEY != '' }}
        run: |
          if [[ "$HAS_HOST" != "true" || "$HAS_USER" != "true" || "$HAS_KEY" != "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SSH secrets not configured — deploy skipped. Set MD_PROD_SSH_HOST, MD_PROD_SSH_USER, MD_PROD_SSH_KEY in repo secrets."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.check_secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MD_PROD_SSH_HOST }}
          username: ${{ secrets.MD_PROD_SSH_USER }}
          key: ${{ secrets.MD_PROD_SSH_KEY }}
          port: ${{ secrets.MD_PROD_SSH_PORT || '22' }}
          script: |
            set -e
            APP_DIR="${{ secrets.MD_PROD_APP_DIR || '/srv/apps/md' }}"
            cd "$APP_DIR"
            git pull --ff-only origin main
            docker compose -f docker-compose.nas.yml up -d --build --remove-orphans
            docker image prune -f
            docker compose -f docker-compose.nas.yml ps
