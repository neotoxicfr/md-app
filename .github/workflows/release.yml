name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: go.sum

      - name: Test
        run: go test -race ./...

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
